<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculator!</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>

  <body>
    <div Calculator Body id="calcBody">
      <div 12 + 34 id="screen"></div>
      <div Buttons Row 1>
        <button class="numberBtn" value="1">1</button>
        <button class="numberBtn" value="2">2</button>
        <button class="numberBtn" value="3">3</button>
        <button class="otherBtn operatorBtn" id="divideBtn" value="÷">/</button>
      </div>
      <div Buttons Row 2>
        <button class="numberBtn" value="4">4</button>
        <button class="numberBtn" value="5">5</button>
        <button class="numberBtn" value="6">6</button>
        <button class="otherBtn operatorBtn" id="multiplyBtn" value="x">
          x
        </button>
      </div>
      <div Buttons Row 3>
        <button class="numberBtn" value="7">7</button>
        <button class="numberBtn" value="8">8</button>
        <button class="numberBtn" value="9">9</button>
        <button class="otherBtn operatorBtn" id="plusBtn" value="+">+</button>
      </div>
      <div Buttons Row 4>
        <button class="otherBtn" id="clearBtn">C</button>
        <button class="numberBtn" value="0">0</button>
        <button class="otherBtn" id="decimalBtn">.</button>
        <button class="otherBtn operatorBtn" id="minusBtn" value="-">-</button>
      </div>
      <div Button Row 5>
        <button class="otherBtn" id="equalsBtn">=</button>
        <button class="otherBtn" id="answerBtn">Ans</button>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
