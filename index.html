<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calculator!</title>
    <link rel="stylesheet" href="calculator.css" />
  </head>

  <body>
    <div Calculator Body id="calcBody">
      <div 12 + 34 id="screen"></div>
      <div Buttons Row 1>
        <button class="numberBtn" id="btn1" value="1">1</button>
        <button class="numberBtn" id="btn2" value="2">2</button>
        <button class="numberBtn" id="btn3" value="3">3</button>
        <button class="otherBtn" id="divideBtn">/</button>
      </div>
      <div Buttons Row 2>
        <button class="numberBtn" id="btn4" value="4">4</button>
        <button class="numberBtn" id="btn5" value="5">5</button>
        <button class="numberBtn" id="btn6" value="6">6</button>
        <button class="otherBtn" id="multiplyBtn">x</button>
      </div>
      <div Buttons Row 3>
        <button class="numberBtn" id="btn7" value="7">7</button>
        <button class="numberBtn" id="btn8" value="8">8</button>
        <button class="numberBtn" id="btn9" value="9">9</button>
        <button class="otherBtn" id="plusBtn">+</button>
      </div>
      <div Buttons Row 4>
        <button class="otherBtn" id="clearBtn">C</button>
        <button class="numberBtn" id="btn0" value="0">0</button>
        <button class="otherBtn" id="equalsBtn">=</button>
        <button class="otherBtn" id="minusBtn">-</button>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
